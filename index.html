<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/cake-new.css">
    <link rel="icon" href="data:,">
    <title>New cake</title>

</head>
<body>
    <div class="main-container">
        <div class="label-container">
            <div class="happy-birthday">Drag the Candle on Top of the Cake</div>
        </div>
       
        <div class="cake-container">
            <div class="candle-and-cake-container">
                <div class="candle-stage"></div>
                 <img class="cake"></img>
            </div>
                
            <div class="candle-holder">
                <div class="candle" draggable="true">
                    <div class="candle-stick">
                         <div class="fire">
                            <div class="fire1">
                                <div class="fire2">
                                    <div class="fire3"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                   
                </div>
            </div>
        </div>
       
        
        
        <button class="blow-btn" onclick="blowCandle()">Blow the Candle</button>
        <audio src="" class="js-happy-music"></audio>
        <div class="gift-invitation-container">
             <div class="gift-invitation">Naa ko gift. do you wanna see?</div>
            <div class="button-container">
                <button class="yes" >Yes</button>
                <button class="no">No</button>
            </div>
        </div>
       
        
    </div>
    <script src="scripts/cake-new.js">
       
    </script>
</body>
</html>
